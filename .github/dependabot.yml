version: 2
updates:
  # Backend Python deps
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  # Frontend (Vite SPA)
  - package-ecosystem: npm
    directory: "/frontend/vidlearn-frontend-main"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Docker base images
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
