name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    env:
      # Hermetic config — no real providers needed; tests mock LLM/TTS/storage.
      SECRET_KEY: ci-secret-not-for-production-0123456789abcdef
      DATABASE_URL: sqlite:///ci.db
      REDIS_URL: ""
      USE_TASK_QUEUE: "false"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check shiksha wsgi.py tests

      - name: Pytest
        run: pytest -q

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so historical leaks are caught
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: shiksha:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
