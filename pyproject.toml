[tool.ruff]
target-version = "py313"
line-length = 120
extend-exclude = ["frontend", "migrations"]

[tool.ruff.lint]
# Pyflakes (F), pycodestyle errors (E), warnings (W), isort (I), bugbear (B), pyupgrade (UP).
select = ["E", "F", "W", "I", "B", "UP"]
# E501 (line length) is enforced by the formatter; allow long comment lines in
# the existing modules. E402: package __init__ imports routes last by design.
ignore = ["E501", "E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
